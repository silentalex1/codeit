<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PrysmisAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#11111b] text-[#cdd6f4] h-screen flex flex-col items-center justify-center font-sans overflow-hidden">
    <div class="bg-[#181825] border border-[#313244] rounded-2xl p-10 w-full max-w-md flex flex-col gap-6 shadow-xl">
        <h1 class="text-3xl font-bold text-center text-[#89b4fa] tracking-wide">Login</h1>
        <div class="flex flex-col gap-4">
            <input type="text" id="login-user" class="w-full bg-[#1e1e2e] border border-[#313244] rounded-lg p-4 text-[#cdd6f4] outline-none focus:border-[#89b4fa] transition-all" placeholder="Enter your username">
            <input type="password" id="login-pass" class="w-full bg-[#1e1e2e] border border-[#313244] rounded-lg p-4 text-[#cdd6f4] outline-none focus:border-[#89b4fa] transition-all" placeholder="Enter your password">
            <div id="err-msg" class="text-[#f38ba8] text-sm hidden font-bold">Invalid credentials.</div>
            <button id="login-btn" class="w-full bg-[#89b4fa] hover:bg-[#74c7ec] text-[#11111b] font-bold py-4 rounded-lg transition-all mt-2">Login to account</button>
            <a href="/register" class="text-center text-sm text-[#a6adc8] hover:text-[#89b4fa] mt-2">Don't have an account? Create one.</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
