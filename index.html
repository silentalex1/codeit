<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PrysmisAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#11111b] text-[#cdd6f4] h-screen font-sans overflow-hidden flex flex-col hidden" id="app-body">
    <nav class="h-16 bg-[#181825] border-b border-[#313244] flex items-center justify-between px-6 shrink-0 z-20">
        <div class="flex items-center gap-4">
            <button id="sidebar-toggle" class="text-[#a6adc8] hover:text-[#89b4fa] transition-colors p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-xl font-bold text-[#89b4fa] tracking-wide">PrysmisAI</h1>
        </div>
        <div class="flex items-center gap-2 md:gap-4">
            <button id="wb-toggle" class="flex items-center gap-2 border border-[#313244] bg-[#1e1e2e] text-[#a6adc8] px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-bold transition-all hover:bg-[#313244] text-xs md:text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                <span class="hidden md:inline">Whiteboard</span>
            </button>
            <button id="humanize-btn" class="flex items-center gap-2 border border-[#313244] bg-[#1e1e2e] text-[#a6adc8] px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-bold transition-all hover:bg-[#313244] text-xs md:text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span class="hidden md:inline">Ai Humanize</span>
            </button>
            <button id="settings-open" class="text-[#a6adc8] hover:text-[#89b4fa] transition-colors p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
            <button id="logout-btn" class="bg-[#313244] hover:bg-[#45475a] text-[#cdd6f4] px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-bold transition-all text-xs md:text-sm">Logout</button>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden min-h-0 relative">
        <div id="sidebar" class="w-80 bg-[#181825] border-r border-[#313244] flex flex-col p-6 gap-6 z-10 shrink-0">
            <button id="new-chat-btn" class="w-full font-bold bg-[#89b4fa] text-[#11111b] px-4 py-3 rounded-lg hover:bg-[#74c7ec] transition-colors shadow-md">+ new chat</button>
            <div class="flex flex-col gap-4 flex-1 overflow-y-auto" id="chat-list-container">
                <div id="chat-list" class="flex flex-col gap-2"></div>
            </div>
            <div class="flex flex-col gap-4 shrink-0">
                <h2 class="text-xs font-bold text-[#a6adc8] uppercase tracking-wider">Bridge Connections</h2>
                <div class="flex flex-col p-4 bg-[#1e1e2e] border border-[#313244] rounded-xl">
                    <div class="flex items-center gap-3 mb-2">
                        <svg class="w-5 h-5 text-[#a6adc8]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                        <span class="font-semibold text-sm">Bookmarklet</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span id="bm-dot" class="w-2.5 h-2.5 rounded-full bg-[#f38ba8]"></span>
                        <span id="bm-text" class="text-xs font-bold text-[#f38ba8]">Disconnected</span>
                    </div>
                </div>
                <div class="flex flex-col p-4 bg-[#1e1e2e] border border-[#313244] rounded-xl">
                    <div class="flex items-center gap-3 mb-2">
                        <svg class="w-5 h-5 text-[#a6adc8]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                        <span class="font-semibold text-sm">Studio Plugin</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span id="st-dot" class="w-2.5 h-2.5 rounded-full bg-[#f38ba8]"></span>
                        <span id="st-text" class="text-xs font-bold text-[#f38ba8]">Waiting</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex overflow-hidden min-h-0 relative">
            <div class="flex-1 flex flex-col relative bg-[#11111b] min-w-0">
                <div id="chat-area" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col gap-6 relative min-h-0"></div>
                <div class="p-4 md:p-6 bg-[#181825] border-t border-[#313244] shrink-0 pb-safe">
                    <div class="max-w-5xl mx-auto flex flex-col gap-2">
                        <div id="chat-preview" class="hidden gap-2 flex-wrap max-h-32 overflow-y-auto w-full"></div>
                        <div class="flex flex-col w-full relative border border-[#313244] bg-[#1e1e2e] rounded-xl overflow-hidden shadow-inner">
                            <div id="reply-preview" class="hidden flex items-center justify-between bg-[#11111b] border-b border-[#313244] px-4 py-2 text-xs text-[#a6adc8]">
                                <span class="truncate" id="reply-preview-text">Replying to...</span>
                                <button id="reply-cancel" class="text-[#f38ba8] font-bold hover:text-red-400 transition-colors">Cancel</button>
                            </div>
                            <div class="flex gap-2 md:gap-4 p-2 w-full relative items-end">
                                <button class="rr-cont">Continue AI</button>
                                <button id="mobile-image-btn" class="p-2 bg-[#313244] hover:bg-[#45475a] text-[#a6adc8] hover:text-[#89b4fa] rounded-lg transition-all flex items-center justify-center shrink-0">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                </button>
                                <input type="file" id="mobile-image-input" accept="image/*" class="hidden">
                                <textarea id="chat-input" class="flex-1 bg-transparent p-2 text-[#cdd6f4] outline-none resize-none min-h-[36px] md:min-h-[44px] max-h-[150px] text-sm md:text-base" placeholder="Ask PrysmisAI anything.."></textarea>
                                <button id="send-btn" class="bg-[#89b4fa] hover:bg-[#74c7ec] text-[#11111b] font-bold px-4 md:px-6 py-1.5 md:py-2 rounded-lg transition-all h-[36px] md:h-[44px] self-end shadow-md text-xs md:text-sm">Send</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="whiteboard-panel" class="w-0 bg-[#181825] border-l border-[#313244] flex flex-col transition-all duration-300 overflow-hidden relative shrink-0">
                <div class="h-16 border-b border-[#313244] flex items-center justify-between px-6 shrink-0 bg-[#11111b]">
                    <h3 class="font-bold text-[#89b4fa]" id="wb-title">Whiteboard</h3>
                    <button id="wb-close" class="text-[#a6adc8] hover:text-[#f38ba8] transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="flex-1 p-4 md:p-6 flex flex-col gap-4 min-h-0 pb-safe-bottom">
                    <div class="relative flex-1 bg-[#1e1e2e] border border-[#313244] rounded-xl overflow-hidden shadow-inner">
                        <canvas id="wb-canvas" class="w-full h-full block cursor-crosshair"></canvas>
                        <div id="wb-step-overlay" class="absolute bottom-4 left-4 right-4 bg-[#11111b]/90 border border-[#313244] rounded-lg p-3 text-xs hidden shadow-lg">
                            <div class="font-bold text-[#89b4fa] mb-1" id="wb-step-num">Step 1</div>
                            <div class="text-[#cdd6f4]" id="wb-step-desc"></div>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2 md:gap-4 items-center justify-between bg-[#11111b] p-3 md:p-4 border border-[#313244] rounded-xl">
                        <div class="flex gap-1 md:gap-2 items-center">
                            <button id="tool-pencil" class="p-1.5 md:p-2 bg-[#89b4fa] text-[#11111b] rounded-lg font-bold text-[10px] md:text-xs">Pencil</button>
                            <button id="tool-eraser" class="p-1.5 md:p-2 bg-[#313244] text-[#cdd6f4] rounded-lg font-bold text-[10px] md:text-xs hover:bg-[#45475a]">Eraser</button>
                            <button id="wb-clear" class="p-1.5 md:p-2 bg-[#f38ba8] text-[#11111b] rounded-lg font-bold text-[10px] md:text-xs">Clear</button>
                        </div>
                        <div class="flex gap-1 md:gap-2 items-center">
                            <button id="step-prev" class="px-2 py-1 md:px-3 md:py-2 bg-[#313244] rounded-lg font-bold text-xs hover:bg-[#45475a]">&lt;</button>
                            <button id="step-play" class="px-2 py-1 md:px-3 md:py-2 bg-[#a6e3a1] text-[#11111b] rounded-lg font-bold text-xs">Play</button>
                            <button id="step-next" class="px-2 py-1 md:px-3 md:py-2 bg-[#313244] rounded-lg font-bold text-xs hover:bg-[#45475a]">&gt;</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-[#181825] border border-[#313244] rounded-2xl p-6 md:p-8 w-full max-w-lg transform scale-95 transition-transform duration-300 relative shadow-xl mx-4">
            <button id="settings-close" class="absolute top-6 right-6 text-[#a6adc8] hover:text-[#f38ba8] transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h2 class="text-xl md:text-2xl font-bold text-[#89b4fa] mb-6">Settings</h2>
            <div class="flex flex-col gap-2 mb-6">
                <label class="font-bold text-[#cdd6f4] text-sm md:text-base">Enter in your GeminiAPI key.</label>
                <div class="flex gap-4">
                    <input type="password" id="api-key-input" class="flex-1 bg-[#1e1e2e] border border-[#313244] rounded-lg p-3 md:p-4 text-[#cdd6f4] outline-none focus:border-[#89b4fa] transition-all font-mono tracking-widest shadow-inner text-sm md:text-base">
                    <button id="toggle-key-btn" class="bg-[#313244] hover:bg-[#45475a] text-[#cdd6f4] font-bold px-4 md:px-6 rounded-lg transition-all text-xs md:text-sm">show</button>
                </div>
            </div>
            <button id="save-settings-btn" class="w-full bg-[#89b4fa] hover:bg-[#74c7ec] text-[#11111b] font-bold py-3 md:py-4 rounded-lg transition-all shadow-md text-sm md:text-base">Save settings</button>
        </div>
    </div>

    <div id="custom-cmenu" class="hidden fixed bg-[#1e1e2e] border border-[#313244] rounded-lg shadow-xl z-50 py-1 text-xs font-bold text-[#cdd6f4] min-w-[100px] cursor-pointer">
        <button id="cmenu-reply" class="w-full text-left px-4 py-2 hover:bg-[#313244] hover:text-[#89b4fa] transition-colors border-none bg-transparent">Reply</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
