<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT-5.2 • Real Puter.js • Works Now</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root { --tw-color-primary: #10a37f; }
        body { font-family: 'Inter', system_ui, sans-serif; }
        .chat-container { scrollbar-width: thin; scrollbar-color: #10a37f #1f2937; }
        .message-bubble { max-width: 75%; padding: 14px 20px; border-radius: 20px; position: relative; }
        .user-bubble { background: linear-gradient(135deg, #10a37f, #0e8c6b); color: white; border-bottom-right-radius: 4px; }
        .ai-bubble { background: #374151; color: #f3f4f6; border-bottom-left-radius: 4px; }
        .typing-indicator { display: flex; gap: 4px; }
        .typing-dot { width: 6px; height: 6px; background: #9ca3af; border-radius: 50%; animation: typingBounce 1.2s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 150ms; }
        .typing-dot:nth-child(3) { animation-delay: 300ms; }
        @keyframes typingBounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }
        .header-gradient { background: linear-gradient(90deg, #10a37f, #0e8c6b); }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 flex flex-col h-screen overflow-hidden">
    <div class="header-gradient px-6 py-4 flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-x-3">
            <div class="w-8 h-8 bg-white rounded-2xl flex items-center justify-center text-[#10a37f] font-bold text-xl shadow-inner">P</div>
            <div>
                <h1 class="text-2xl font-semibold tracking-tight">ChatGPT-5.2</h1>
                <p class="text-xs text-white/70 flex items-center gap-x-1">
                    <span class="inline-block w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    Real • Powered by Puter.js
                </p>
            </div>
        </div>
        <div class="flex items-center gap-x-4">
            <div class="bg-white/20 text-white text-xs font-medium px-3 py-1 rounded-3xl flex items-center gap-x-1.5">
                <div class="w-2 h-2 bg-emerald-400 rounded-full"></div>
                openai/gpt-5.2-chat
            </div>
            <button onclick="clearChat()" class="flex items-center gap-x-2 bg-white/10 hover:bg-white/20 transition-colors text-white text-sm font-medium px-4 py-2 rounded-3xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.595 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.595-1.858L5 7m5-4v4m4-4v4m-6 0h6" />
                </svg>
                Clear Chat
            </button>
            <div id="puter-status" onclick="checkPuterStatus()" class="flex items-center gap-x-2 text-xs font-medium cursor-pointer bg-white/10 hover:bg-white/20 px-4 py-2 rounded-3xl transition-colors">
                <span class="text-emerald-400">●</span>
                Connected
            </div>
        </div>
    </div>
    <div id="chat-container" class="flex-1 overflow-y-auto chat-container p-6 space-y-8 bg-gray-900"></div>
    <div class="border-t border-gray-700 bg-gray-900 px-6 py-6">
        <div class="max-w-4xl mx-auto">
            <div class="flex items-end gap-x-3 bg-gray-800 rounded-3xl p-2 shadow-2xl">
                <textarea id="user-input" rows="1" onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }" placeholder="Message ChatGPT-5.2... (Press Enter to send)" class="flex-1 bg-transparent px-5 py-4 outline-none resize-none max-h-[180px] text-base placeholder:text-gray-400"></textarea>
                <button onclick="sendMessage()" class="w-11 h-11 bg-emerald-500 hover:bg-emerald-600 transition-colors rounded-2xl flex items-center justify-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.874L5.999 12zm0 0h7.07" />
                    </svg>
                </button>
            </div>
            <div class="text-center text-[10px] text-gray-500 mt-4 flex items-center justify-center gap-x-4">
                <div>Real GPT-5.2 via Puter.js</div>
                <div class="w-px h-3 bg-gray-600"></div>
                <div>Streaming • Cloud history saved</div>
                <div class="w-px h-3 bg-gray-600"></div>
                <div>Hit <span class="font-mono bg-gray-800 px-1.5 rounded">Enter</span> to send</div>
            </div>
        </div>
    </div>
    <script>
        let messages = [{ role: "system", content: "You are ChatGPT-5.2, the most advanced AI model from OpenAI (released December 2025). You are helpful, witty, and highly capable. Always respond in a natural, conversational tone." }];
        const HISTORY_FILE = 'gpt-5.2-chat-history.json';
        let chatContainer = null;
        let inputField = null;
        function renderAllMessages() {
            chatContainer.innerHTML = '';
            if (messages.length <= 1) {
                chatContainer.innerHTML = `
                    <div class="max-w-3xl mx-auto text-center pt-8">
                        <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-3xl mb-6">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2 2 2 0 01-2-2 2 2 0 012-2 2 2 0 01-2-2z" />
                            </svg>
                        </div>
                        <h2 class="text-4xl font-semibold mb-3">Hello, I'm ChatGPT-5.2</h2>
                        <p class="text-gray-400 max-w-md mx-auto">Real access via Puter.js.<br>Sign in to Puter for full usage.</p>
                        <div class="flex flex-wrap gap-3 justify-center mt-8">
                            <button onclick="quickPrompt('Explain quantum computing like I\'m 10')" class="text-sm bg-gray-800 hover:bg-gray-700 transition-colors px-5 py-3 rounded-3xl">Explain quantum computing like I'm 10</button>
                            <button onclick="quickPrompt('Write a short sci-fi story about AI')" class="text-sm bg-gray-800 hover:bg-gray-700 transition-colors px-5 py-3 rounded-3xl">Write a short sci-fi story about AI</button>
                            <button onclick="quickPrompt('What are the biggest breakthroughs in 2026?')" class="text-sm bg-gray-800 hover:bg-gray-700 transition-colors px-5 py-3 rounded-3xl">What are the biggest breakthroughs in 2026?</button>
                        </div>
                    </div>
                `;
                return;
            }
            messages.slice(1).forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`;
                if (msg.role === 'user') {
                    messageDiv.innerHTML = `<div class="message-bubble user-bubble"><p class="text-sm leading-relaxed">${msg.content}</p></div>`;
                } else {
                    messageDiv.innerHTML = `
                        <div class="flex gap-x-4">
                            <div class="w-8 h-8 bg-gradient-to-br from-emerald-400 to-teal-500 rounded-2xl flex-shrink-0 flex items-center justify-center text-white font-bold text-lg">5</div>
                            <div class="message-bubble ai-bubble">
                                <p class="text-sm leading-relaxed whitespace-pre-wrap">${msg.content.replace(/\n/g, '<br>')}</p>
                            </div>
                        </div>
                    `;
                }
                chatContainer.appendChild(messageDiv);
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        function addMessage(role, content, isStreaming = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} group`;
            messageDiv.id = 'msg-' + Date.now();
            if (role === 'user') {
                messageDiv.innerHTML = `<div class="message-bubble user-bubble"><p class="text-sm leading-relaxed">${content}</p></div>`;
            } else {
                messageDiv.innerHTML = `
                    <div class="flex gap-x-4">
                        <div class="w-8 h-8 bg-gradient-to-br from-emerald-400 to-teal-500 rounded-2xl flex-shrink-0 flex items-center justify-center text-white font-bold text-lg">5</div>
                        <div class="message-bubble ai-bubble">
                            ${isStreaming ? `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>` : `<p class="text-sm leading-relaxed whitespace-pre-wrap">${content}</p>`}
                        </div>
                    </div>
                `;
            }
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv.id;
        }
        function updateStreamingMessage(messageId, newText) {
            const messageEl = document.getElementById(messageId);
            if (!messageEl) return;
            const bubble = messageEl.querySelector('.ai-bubble');
            if (bubble) {
                if (bubble.innerHTML.includes('typing-indicator')) {
                    bubble.innerHTML = `<p class="text-sm leading-relaxed whitespace-pre-wrap"></p>`;
                }
                const p = bubble.querySelector('p');
                if (p) p.innerHTML = newText.replace(/\n/g, '<br>');
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        async function saveHistory() {
            if (!window.puter) return;
            try {
                const historyToSave = messages.filter(m => m.role !== 'system');
                await puter.fs.write(HISTORY_FILE, JSON.stringify(historyToSave, null, 2));
            } catch (e) {}
        }
        async function loadHistory() {
            if (!window.puter) return false;
            try {
                const blob = await puter.fs.read(HISTORY_FILE);
                const text = await blob.text();
                const savedMessages = JSON.parse(text);
                messages = [{ role: "system", content: "You are ChatGPT-5.2, the most advanced AI model from OpenAI (released December 2025). You are helpful, witty, and highly capable. Always respond in a natural, conversational tone." }, ...savedMessages];
                return true;
            } catch (e) {
                return false;
            }
        }
        async function sendMessage() {
            const input = inputField.value.trim();
            if (!input || !window.puter) {
                alert("Puter.js not loaded or not signed in. Please refresh and sign in to Puter.");
                return;
            }
            addMessage('user', input);
            messages.push({ role: "user", content: input });
            inputField.value = '';
            const aiMessageId = addMessage('assistant', '', true);
            try {
                const stream = await puter.ai.chat(messages, { 
                    model: "openai/gpt-5.2-chat", 
                    stream: true, 
                    max_tokens: 2048, 
                    temperature: 0.7 
                });
                let accumulatedText = '';
                for await (const chunk of stream) {
                    if (chunk && chunk.text) {
                        accumulatedText += chunk.text;
                        updateStreamingMessage(aiMessageId, accumulatedText);
                    }
                }
                messages.push({ role: "assistant", content: accumulatedText });
                await saveHistory();
            } catch (error) {
                const errorMsg = document.getElementById(aiMessageId);
                if (errorMsg) {
                    errorMsg.querySelector('.ai-bubble').innerHTML = `<p class="text-sm text-red-400">Error — make sure you are signed in to Puter.</p>`;
                }
            }
        }
        function quickPrompt(prompt) {
            inputField.value = prompt;
            sendMessage();
        }
        async function clearChat() {
            if (!confirm('Clear this chat and delete cloud history?')) return;
            messages = [{ role: "system", content: "You are ChatGPT-5.2, the most advanced AI model from OpenAI (released December 2025). You are helpful, witty, and highly capable. Always respond in a natural, conversational tone." }];
            try {
                if (window.puter) await puter.fs.write(HISTORY_FILE, JSON.stringify([]));
            } catch(e) {}
            renderAllMessages();
        }
        function checkPuterStatus() {
            if (window.puter) {
                alert("✅ Real Puter.js connection active.\n\nGPT-5.2 is live via Puter.\nUsers sign in once — usage is billed by Puter (free tier available, then paid by user).");
            } else {
                alert("Puter.js not loaded. Refresh the page.");
            }
        }
        async function initializeApp() {
            chatContainer = document.getElementById('chat-container');
            inputField = document.getElementById('user-input');
            await new Promise(r => setTimeout(r, 800));
            await loadHistory();
            renderAllMessages();
            setTimeout(() => inputField.focus(), 600);
        }
        window.onload = initializeApp;
    </script>
</body>
</html>
