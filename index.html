<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT-5.2 • Forever Chat • Powered by Puter.js</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --tw-color-primary: #10a37f;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .chat-container {
            scrollbar-width: thin;
            scrollbar-color: #10a37f #1f2937;
        }
        
        .message-bubble {
            max-width: 75%;
            padding: 14px 20px;
            border-radius: 20px;
            position: relative;
        }
        
        .user-bubble {
            background: linear-gradient(135deg, #10a37f, #0e8c6b);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .ai-bubble {
            background: #374151;
            color: #f3f4f6;
            border-bottom-left-radius: 4px;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
        }
        
        .typing-dot {
            width: 6px;
            height: 6px;
            background: #9ca3af;
            border-radius: 50%;
            animation: typingBounce 1.2s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 150ms; }
        .typing-dot:nth-child(3) { animation-delay: 300ms; }
        
        @keyframes typingBounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
        }
        
        .header-gradient {
            background: linear-gradient(90deg, #10a37f, #0e8c6b);
        }
        
        .proxy-badge {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 flex flex-col h-screen overflow-hidden">
    <!-- Header -->
    <div class="header-gradient px-6 py-4 flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-x-3">
            <div class="w-8 h-8 bg-white rounded-2xl flex items-center justify-center text-[#10a37f] font-bold text-xl shadow-inner">P</div>
            <div>
                <h1 class="text-2xl font-semibold tracking-tight">ChatGPT-5.2</h1>
                <p class="text-xs text-white/70 flex items-center gap-x-1">
                    <span class="inline-block w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    Forever Chat • Deep Puter.js Proxy
                </p>
            </div>
        </div>
        
        <div class="flex items-center gap-x-4">
            <!-- Model badge -->
            <div class="bg-white/20 text-white text-xs font-medium px-3 py-1 rounded-3xl flex items-center gap-x-1.5">
                <div class="w-2 h-2 bg-emerald-400 rounded-full"></div>
                gpt-5.2 (Thinking)
            </div>
            
            <!-- Proxy status (deep Puter cloud integration) -->
            <div onclick="showProxyInfo()" 
                 class="proxy-badge flex items-center gap-x-2 text-xs font-medium cursor-pointer bg-emerald-500/20 hover:bg-emerald-500/30 text-emerald-200 px-4 py-1 rounded-3xl transition-colors border border-emerald-400/30">
                <span class="text-emerald-400">🔥</span>
                DEEP PROXY ACTIVE
                <span class="text-[10px] bg-emerald-600 px-2 py-px rounded-full">Cloud-synced forever</span>
            </div>
            
            <!-- Clear chat -->
            <button onclick="clearChat()" 
                    class="flex items-center gap-x-2 bg-white/10 hover:bg-white/20 transition-colors text-white text-sm font-medium px-4 py-2 rounded-3xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.595 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.595-1.858L5 7m5-4v4m4-4v4m-6 0h6" />
                </svg>
                Clear Forever Chat
            </button>
            
            <!-- Puter status -->
            <div id="puter-status" onclick="checkPuterStatus()" 
                 class="flex items-center gap-x-2 text-xs font-medium cursor-pointer bg-white/10 hover:bg-white/20 px-4 py-2 rounded-3xl transition-colors">
                <span class="text-emerald-400">●</span>
                Connected to Puter Deep Proxy
            </div>
        </div>
    </div>

    <!-- Chat Area -->
    <div id="chat-container" class="flex-1 overflow-y-auto chat-container p-6 space-y-8 bg-gray-900">
        <!-- Welcome / messages will be rendered dynamically -->
    </div>

    <!-- Input Area -->
    <div class="border-t border-gray-700 bg-gray-900 px-6 py-6">
        <div class="max-w-4xl mx-auto">
            <div class="flex items-end gap-x-3 bg-gray-800 rounded-3xl p-2 shadow-2xl">
                <textarea id="user-input" 
                          rows="1"
                          onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"
                          placeholder="Message ChatGPT-5.2... (Press Enter to send)"
                          class="flex-1 bg-transparent px-5 py-4 outline-none resize-none max-h-[180px] text-base placeholder:text-gray-400"></textarea>
                
                <button onclick="sendMessage()" 
                        class="w-11 h-11 bg-emerald-500 hover:bg-emerald-600 transition-colors rounded-2xl flex items-center justify-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.874L5.999 12zm0 0h7.07" />
                    </svg>
                </button>
            </div>
            
            <div class="text-center text-[10px] text-gray-500 mt-4 flex items-center justify-center gap-x-4">
                <div>Deep Puter.js Proxy • Unlimited cloud persistence</div>
                <div class="w-px h-3 bg-gray-600"></div>
                <div>ChatGPT-5.2 • Real-time streaming • Forever history</div>
                <div class="w-px h-3 bg-gray-600"></div>
                <div>Hit <span class="font-mono bg-gray-800 px-1.5 rounded">Enter</span> to send</div>
            </div>
        </div>
    </div>

    <script>
        // TailwindCSS initialization (unchanged)
        function initTailwind() {
            return {
                config(userConfig = {}) {
                    return {
                        configUser: userConfig,
                        theme: {
                            extend: {
                                fontFamily: {
                                    inter: ['Inter', 'sans-serif']
                                }
                            }
                        }
                    }
                },
                theme(config) {
                    return config.theme
                }
            }
        }
        
        // Global conversation history
        let messages = [
            {
                role: "system",
                content: "You are ChatGPT-5.2, the most advanced AI model from OpenAI (released December 2025). You are helpful, witty, and highly capable. Always respond in a natural, conversational tone."
            }
        ]
        
        // Puter deep proxy constants
        const HISTORY_FILE = 'gpt-5.2-chat-history.json'
        
        // DOM references
        let chatContainer = null
        let inputField = null
        
        // Render ALL messages from history (used on load and after clear)
        function renderAllMessages() {
            chatContainer.innerHTML = ''
            
            // If only system prompt exists → show welcome screen
            if (messages.length <= 1) {
                chatContainer.innerHTML = `
                    <div class="max-w-3xl mx-auto text-center pt-8">
                        <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-3xl mb-6">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2 2 2 0 01-2-2 2 2 0 012-2 2 2 0 01-2-2z" />
                            </svg>
                        </div>
                        <h2 class="text-4xl font-semibold mb-3">Hello, I'm ChatGPT-5.2</h2>
                        <p class="text-gray-400 max-w-md mx-auto">Your forever chat is now powered by Puter.js Deep Proxy.<br>No limits. History saved in the cloud forever.</p>
                        
                        <div class="flex flex-wrap gap-3 justify-center mt-8">
                            <button onclick="quickPrompt('Explain quantum computing like I\'m 10')" 
                                    class="text-sm bg-gray-800 hover:bg-gray-700 transition-colors px-5 py-3 rounded-3xl">Explain quantum computing like I'm 10</button>
                            <button onclick="quickPrompt('Write a short sci-fi story about AI')" 
                                    class="text-sm bg-gray-800 hover:bg-gray-700 transition-colors px-5 py-3 rounded-3xl">Write a short sci-fi story about AI</button>
                            <button onclick="quickPrompt('What are the biggest breakthroughs in 2026?')" 
                                    class="text-sm bg-gray-800 hover:bg-gray-700 transition-colors px-5 py-3 rounded-3xl">What are the biggest breakthroughs in 2026?</button>
                        </div>
                    </div>
                `
                return
            }
            
            // Render every past message
            messages.slice(1).forEach(msg => {
                const messageDiv = document.createElement('div')
                messageDiv.className = `flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`
                
                if (msg.role === 'user') {
                    messageDiv.innerHTML = `
                        <div class="message-bubble user-bubble">
                            <p class="text-sm leading-relaxed">${msg.content}</p>
                        </div>
                    `
                } else {
                    messageDiv.innerHTML = `
                        <div class="flex gap-x-4">
                            <div class="w-8 h-8 bg-gradient-to-br from-emerald-400 to-teal-500 rounded-2xl flex-shrink-0 flex items-center justify-center text-white font-bold text-lg">5</div>
                            <div class="message-bubble ai-bubble">
                                <p class="text-sm leading-relaxed whitespace-pre-wrap">${msg.content.replace(/\n/g, '<br>')}</p>
                            </div>
                        </div>
                    `
                }
                chatContainer.appendChild(messageDiv)
            })
            
            chatContainer.scrollTop = chatContainer.scrollHeight
        }
        
        // Add a single message to UI (used during live chat)
        function addMessage(role, content, isStreaming = false) {
            const messageDiv = document.createElement('div')
            messageDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} group`
            messageDiv.id = 'msg-' + Date.now()
            
            if (role === 'user') {
                messageDiv.innerHTML = `
                    <div class="message-bubble user-bubble">
                        <p class="text-sm leading-relaxed">${content}</p>
                    </div>
                `
            } else {
                messageDiv.innerHTML = `
                    <div class="flex gap-x-4">
                        <div class="w-8 h-8 bg-gradient-to-br from-emerald-400 to-teal-500 rounded-2xl flex-shrink-0 flex items-center justify-center text-white font-bold text-lg">5</div>
                        <div class="message-bubble ai-bubble">
                            ${isStreaming ? 
                                `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>` : 
                                `<p class="text-sm leading-relaxed whitespace-pre-wrap">${content}</p>`
                            }
                        </div>
                    </div>
                `
            }
            
            chatContainer.appendChild(messageDiv)
            chatContainer.scrollTop = chatContainer.scrollHeight
            return messageDiv.id
        }
        
        // Update streaming message
        function updateStreamingMessage(messageId, newText) {
            const messageEl = document.getElementById(messageId)
            if (!messageEl) return
            const bubble = messageEl.querySelector('.ai-bubble')
            if (bubble) {
                if (bubble.innerHTML.includes('typing-indicator')) {
                    bubble.innerHTML = `<p class="text-sm leading-relaxed whitespace-pre-wrap"></p>`
                }
                const p = bubble.querySelector('p')
                if (p) p.innerHTML = newText.replace(/\n/g, '<br>')
            }
            chatContainer.scrollTop = chatContainer.scrollHeight
        }
        
        // === DEEP PUTER.JS PROXY: Save chat to cloud forever ===
        async function saveHistory() {
            if (!window.puter) return
            try {
                // Save only user + assistant messages (exclude system prompt)
                const historyToSave = messages.filter(m => m.role !== 'system')
                await puter.fs.write(HISTORY_FILE, JSON.stringify(historyToSave, null, 2))
                console.log('%c✅ Deep proxy saved chat history to Puter cloud', 'color:#10a37f;font-size:11px')
            } catch (e) {
                console.warn('Could not save to Puter (offline or permission issue)', e)
            }
        }
        
        // === DEEP PUTER.JS PROXY: Load forever chat from cloud ===
        async function loadHistory() {
            if (!window.puter) return false
            try {
                const blob = await puter.fs.read(HISTORY_FILE)
                const text = await blob.text()
                const savedMessages = JSON.parse(text)
                
                // Rebuild full messages array with system prompt
                messages = [
                    {
                        role: "system",
                        content: "You are ChatGPT-5.2, the most advanced AI model from OpenAI (released December 2025). You are helpful, witty, and highly capable. Always respond in a natural, conversational tone."
                    },
                    ...savedMessages
                ]
                console.log('%c✅ Deep proxy loaded forever chat from Puter cloud', 'color:#10a37f;font-size:11px')
                return true
            } catch (e) {
                console.log('No previous forever chat found (first time or cleared)')
                return false
            }
        }
        
        // Send message (unchanged logic + deep proxy save)
        async function sendMessage() {
            const input = inputField.value.trim()
            if (!input || !window.puter) return
            
            addMessage('user', input)
            messages.push({ role: "user", content: input })
            inputField.value = ''
            
            const aiMessageId = addMessage('assistant', '', true)
            
            try {
                const stream = await puter.ai.chat(messages, {
                    model: "gpt-5.2",
                    stream: true,
                    max_tokens: 4096,
                    temperature: 0.7
                })
                
                let accumulatedText = ''
                for await (const chunk of stream) {
                    if (chunk && chunk.text) {
                        accumulatedText += chunk.text
                        updateStreamingMessage(aiMessageId, accumulatedText)
                    }
                }
                
                messages.push({ role: "assistant", content: accumulatedText })
                
                // DEEP PROXY: Save to cloud after every complete response
                await saveHistory()
                
            } catch (error) {
                console.error("Puter.js AI error:", error)
                const errorMsg = document.getElementById(aiMessageId)
                if (errorMsg) {
                    errorMsg.querySelector('.ai-bubble').innerHTML = `
                        <p class="text-sm text-red-400">⚠️ Deep proxy error. Make sure you're signed into Puter.</p>
                    `
                }
            }
        }
        
        function quickPrompt(prompt) {
            inputField.value = prompt
            sendMessage()
        }
        
        // Clear chat and also wipe from cloud proxy
        async function clearChat() {
            if (!confirm('Clear this forever chat? This will delete the entire history from Puter cloud.')) return
            
            messages = [{
                role: "system",
                content: "You are ChatGPT-5.2, the most advanced AI model from OpenAI (released December 2025). You are helpful, witty, and highly capable. Always respond in a natural, conversational tone."
            }]
            
            // Wipe from cloud
            try {
                if (window.puter) {
                    await puter.fs.write(HISTORY_FILE, JSON.stringify([])) // empty history
                }
            } catch(e) {}
            
            renderAllMessages()
        }
        
        function checkPuterStatus() {
            if (window.puter) {
                alert("✅ Deep Puter.js Proxy is ACTIVE!\n\n• All chats are saved forever in your personal Puter cloud.\n• No API keys needed.\n• History survives browser restarts, device changes, etc.\n\nYou can close this tab and come back anytime — your chat will still be here.")
            } else {
                alert("Puter.js is loading… Please refresh if it doesn't connect.")
            }
        }
        
        function showProxyInfo() {
            alert("🔥 DEEP PUTER.JS PROXY\n\nThis site uses Puter.js as a full cloud proxy:\n• AI responses via puter.ai\n• Complete chat history saved automatically to your personal cloud storage (gpt-5.2-chat-history.json)\n• Unlimited, forever persistence — even across devices\n• No limits on conversation length\n\nYour chat literally lives in the Puter cloud forever.")
        }
        
        // Initialize everything
        async function initializeApp() {
            chatContainer = document.getElementById('chat-container')
            inputField = document.getElementById('user-input')
            
            // Tailwind
            initTailwind()
            
            console.log('%c🚀 ChatGPT-5.2 Forever Chat ready! Deep Puter.js Proxy engaged', 'color:#10a37f; font-family:monospace; font-size:13px')
            
            // Wait a moment for Puter.js to fully initialize
            await new Promise(r => setTimeout(r, 800))
            
            // Load forever chat from deep Puter proxy
            await loadHistory()
            
            // Render either welcome or full history
            renderAllMessages()
            
            // Focus input
            setTimeout(() => inputField.focus(), 600)
            
            console.log('✅ Forever chat with deep cloud proxy is now live!')
        }
        
        window.onload = initializeApp
    </script>
</body>
</html>
