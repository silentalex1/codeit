<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prysmis Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#060f0a] text-[#d1ebd9] min-h-screen flex items-center justify-center font-sans">
    <div class="bg-[#0a1711] border border-[#1a4d33] rounded-2xl p-8 shadow-[0_15px_35px_rgba(26,77,51,0.4)] w-full max-w-md transition-all duration-500 hover:shadow-[0_20px_50px_rgba(39,130,79,0.3)]">
        
        <div class="flex items-center justify-center mb-8 gap-3">
            <svg class="w-8 h-8 text-[#5ad68c]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <h1 class="text-3xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-[#5ad68c] to-[#27824f]">Prysmis Bridge</h1>
        </div>
        
        <div class="space-y-6">
            <div class="flex items-center justify-between p-4 bg-[#0f2118] border border-[#1a4d33] rounded-xl transition-all duration-300 hover:bg-[#152e22]">
                <div class="flex items-center gap-3">
                    <svg class="w-6 h-6 text-[#a6adc8]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                    <span class="font-semibold tracking-wide">Bookmarklet</span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="bm-dot" class="w-3 h-3 rounded-full bg-[#f38ba8]"></span>
                    <span id="bm-text" class="text-sm font-bold text-[#f38ba8]">Disconnected</span>
                </div>
            </div>

            <div class="flex items-center justify-between p-4 bg-[#0f2118] border border-[#1a4d33] rounded-xl transition-all duration-300 hover:bg-[#152e22]">
                <div class="flex items-center gap-3">
                    <svg class="w-6 h-6 text-[#a6adc8]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    <span class="font-semibold tracking-wide">Studio Plugin</span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="st-dot" class="w-3 h-3 rounded-full bg-[#f38ba8]"></span>
                    <span id="st-text" class="text-sm font-bold text-[#f38ba8]">Waiting</span>
                </div>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
